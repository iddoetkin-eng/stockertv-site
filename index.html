html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow-x:hidden}

/* ── NAV ── */
#nav{

.nav-scroll-area{flex:1;overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
.nav-scroll-area::-webkit-scrollbar{display:none}
.nav-links{display:flex;align-items:center;gap:.08rem;white-space:nowrap;padding:.2rem 0}

.nav-link:hover{color:var(--text-active);background:var(--accent)}
.nav-link.active{color:var(--text-active);background:rgba(255,255,255,.09);}
.nav-num{font-size:.48rem;opacity:.28;font-weight:600}

/* ── PROGRESS ── */
#scroll-progress{
  position:fixed;top:var(--nav-h);left:0;height:2px;width:0%;
  background:linear-gradient(90deg,rgba(255,255,255,.15),rgba(255,255,255,.65));
  z-index:9998;transition:width .06s linear;pointer-events:none;
}

/* ── DOTS ── */
#dot-nav{
  position:fixed;right:1rem;top:50%;transform:translateY(-50%);
  z-index:9998;display:flex;flex-direction:column;gap:.42rem;
}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.18);cursor:pointer;
  transition:all .25s cubic-bezier(.16,1,.3,1);border:none;padding:0;
}
.dot:hover,.dot.active{background:#fff;transform:scale(1.8)}

/* ── SECTIONS — key fix: auto height, iframe grows to content ── */
.page-section{
  width:100%;
  min-height:100vh;       /* at least full screen */
  height:auto;            /* grow beyond if content needs it */
  position:relative;
  padding-top:var(--nav-h); /* push content below nav */

/* First section doesn't need the offset hack */

.page-section iframe{

  display:block;
  border:none;

  min-height:100vh;
  height:100vh; /* initial, will be updated */
}

  position:fixed;

  right:2rem;

#floating-cta:active{

#floating-cta svg{

#floating-cta:hover svg{

#floating-cta .cta-pulse{

@keyframes ctaEntrance{

@keyframes ctaFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}
@keyframes pulseRing{
  0%{opacity:.6;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.35)}
}

            } else {
                cards.forEach(card => card.classList.remove('expanded'));
                clickedCard.classList.add('expanded');
            }

    <script>
        // Interactive Filter Chips Logic
        document.addEventListener('DOMContentLoaded', () => {
            const filterChips = document.querySelectorAll('.ui-filter-chip');
            const feed = document.querySelector('.ui-feed');
            const cards = document.querySelectorAll('.ui-card');

            filterChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const filterValue = chip.getAttribute('data-filter');

                    // Remove active class from all chips
                    filterChips.forEach(c => c.classList.remove('active'));
                    
                    // Add active class to the clicked chip
                    chip.classList.add('active');
                    
                    // Fade out
                    feed.style.transition = 'opacity 0.2s ease';
                    feed.style.opacity = '0';
                    
                    setTimeout(() => {
                        // Filter the cards
                        cards.forEach(card => {
                            if (filterValue === 'all' || card.getAttribute('data-category') === filterValue) {
                                card.style.display = 'flex';
                            } else {
                                card.style.display = 'none';
                            }
                        });
                        
                        // Fade back in
                        feed.style.opacity = '1';
                    }, 250); // Matches the timeout with the fade-out duration
                });
            });

            // Video Play Logic
            const videoPlaceholders = document.querySelectorAll('.ui-video-placeholder');
            let isVideoPlaying = false;

            videoPlaceholders.forEach(placeholder => {
                const video = placeholder.querySelector('video');
                const playBtn = placeholder.querySelector('.ui-play-btn');

                // Force thumbnail load (fixes black screens on certain browsers)
                video.addEventListener('loadedmetadata', function() {
                    this.currentTime = 0.1;
                });
                if (video.readyState >= 1) {
                    video.currentTime = 0.1;
                }

                // Toggle play on click
                placeholder.addEventListener('click', () => {
                    if (video.paused) {
                        // Pause all other videos
                        document.querySelectorAll('.ui-video-placeholder video').forEach(v => {
                            if (v !== video) {
                                v.pause();
                                v.removeAttribute('controls');
                                v.nextElementSibling.style.display = 'flex'; // Show play button
                            }
                        });

                        // Play current video
                        video.muted = false; // Ensure sound is on
                        video.play();
                        video.setAttribute('controls', 'controls'); // Show native controls once playing
                        playBtn.style.display = 'none'; // Hide play button
                    } else {
                        video.pause();
                    }
                });

                // When video is paused (via native controls or click)
                video.addEventListener('pause', () => {
                    playBtn.style.display = 'flex';
                    video.removeAttribute('controls'); // Hide controls when paused to keep it clean
                    checkIfAnyVideoPlaying();
                });

                // When video ends
                video.addEventListener('ended', () => {
                    playBtn.style.display = 'flex';
                    video.removeAttribute('controls');
                    checkIfAnyVideoPlaying();
                });

                // When video starts playing
                video.addEventListener('play', () => {
                    checkIfAnyVideoPlaying();
                });
            });

            function checkIfAnyVideoPlaying() {
                const videos = document.querySelectorAll('.ui-video-placeholder video');
                isVideoPlaying = Array.from(videos).some(v => !v.paused);
            }

            // Auto-scroll simulation to illustrate scrolling behavior
            const phoneScreen = document.querySelector('.phone-screen');
            const filtersContainer = document.querySelector('.ui-filters');
            
            let isHovering = false;
            let filterPos = 0;
            let filterDir = 1;
            let feedPos = 0;
            let feedDir = 1;

            // Pause animations when user interacts
            phoneScreen.addEventListener('mouseenter', () => isHovering = true);
            phoneScreen.addEventListener('mouseleave', () => {
                isHovering = false;
                // Resync position so animation continues smoothly from where user left it
                filterPos = filtersContainer.scrollLeft;
                feedPos = feed.scrollTop;
            });

            // Smooth animation loop
            function animateScroll() {
                // Only scroll if not hovering AND no video is currently playing
                if (!isHovering &amp;&amp; !isVideoPlaying) {
                    // Filters auto-scroll (horizontal)
                    const maxFilterScroll = filtersContainer.scrollWidth - filtersContainer.clientWidth;
                    if (maxFilterScroll > 0) {
                        filterPos += 0.3 * filterDir; // Slow panning speed
                        if (filterPos >= maxFilterScroll) filterDir = -1;
                        if (filterPos <= 0) filterDir = 1;
                        filtersContainer.scrollLeft = filterPos;
                    }

                    // Feed auto-scroll (vertical)
                    const maxFeedScroll = feed.scrollHeight - feed.clientHeight;
                    if (maxFeedScroll > 0) {
                        feedPos += 0.4 * feedDir; // Slow vertical feed scroll
                        if (feedPos >= maxFeedScroll) feedDir = -1;
                        if (feedPos <= 0) feedDir = 1;
                        feed.scrollTop = feedPos;
                    }
                }
                requestAnimationFrame(animateScroll);
            }

            // Start animation loop shortly after intro animations finish
            setTimeout(() => {
                requestAnimationFrame(animateScroll);
            }, 2500);

            // Modal Logic
            const watchDemoWidget = document.getElementById('watchDemoWidget');
            const demoModal = document.getElementById('demoModal');
            const demoVideo = document.getElementById('demoVideo');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const modalBackdrop = document.querySelector('.modal-backdrop');

            function openModal() {
                demoModal.classList.add('active');
                demoVideo.play();
                isVideoPlaying = true; // Pause auto-scroll in the background phone
                
                // Pause any playing videos inside the phone mock
                document.querySelectorAll('.ui-video-placeholder video').forEach(v => {
                    if (!v.paused) {
                        v.pause();
                        v.removeAttribute('controls');
                        if (v.nextElementSibling) v.nextElementSibling.style.display = 'flex';
                    }
                });
            }

            function closeModal() {
                demoModal.classList.remove('active');
                demoVideo.pause();
                demoVideo.currentTime = 0;
                checkIfAnyVideoPlaying(); // Resume background scroll if no phone videos are playing
            }

            if (watchDemoWidget) watchDemoWidget.addEventListener('click', openModal);
            if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
            if (modalBackdrop) modalBackdrop.addEventListener('click', closeModal);
            
            // Close guide widget logic
            const closeGuideBtn = document.getElementById('closeGuideBtn');
            if (closeGuideBtn) {
                closeGuideBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); // Prevent opening the modal
                    watchDemoWidget.style.display = 'none'; // Hide the widget completely
                });
            }

            // Close modal on ESC key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' &amp;&amp; demoModal.classList.contains('active')) {
                    closeModal();
                }
            });
        });
    </script>

    // Also poll a few times to catch late renders

            --text-secondary: #a1a1aa; /* Silver/Gray for subhead and helpers */
            --text-muted: #71717a;
            
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            
            /* Enhanced Glassmorphism styling */
            --card-bg: rgba(24, 24, 27, 0.5);
            --card-border: rgba(255, 255, 255, 0.1);
            --card-border-hover: rgba(6, 182, 212, 0.5);
            --card-radius: 20px;
            
            --font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif;
            --transition-speed: 0.4s;
        }

        /* ==========================================================================
           GLOBAL STYLES &amp; RESET
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color); /* Strict black */
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            /* Subtle radial glow to prevent the slide from looking entirely dead, while keeping pure black base */
            background-image: radial-gradient(circle at 50% 100%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
        }

        .slide-container {
            width: 100%;
            max-width: 1400px;
            padding: 4rem 3rem;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        /* ==========================================================================
           HEADER SECTION
           ========================================================================== */
        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .headline {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(to right, #ffffff, #d4d4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .subhead {
            font-size: clamp(1.25rem, 2vw, 1.75rem);
            font-weight: 500;
            color: var(--text-secondary); /* Updated to Gray/Silver */
            max-width: 800px;
        }

        /* ==========================================================================
           PIPELINE DIAGRAM
           ========================================================================== */
        .pipeline-wrapper {
            position: relative;
            width: 100%;
            padding: 2rem 0;
            outline: none;
        }

        .pipeline-track {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            position: relative;
            gap: 1.5rem;
            z-index: 2;
        }

        /* Flowing Line */
        .flow-line {
            position: absolute;
            top: 40px; 
            left: 5%;
            right: 5%;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            z-index: 1;
            border-radius: 2px;
            overflow: hidden;
        }

        .flow-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 200%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(59, 130, 246, 0.1) 20%, 
                rgba(6, 182, 212, 0.8) 50%, 
                rgba(59, 130, 246, 0.1) 80%, 
                transparent 100%);
            animation: flow-animation 3s linear infinite;
        }

        @keyframes flow-animation {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0%); }
        }

        /* The Comet Packet (Glowing dot with a data trail) */
        .packet {
            position: absolute;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            background: #ffffff;
            border-radius: 50%;
            /* Comet trail pointing left on desktop */
            box-shadow: 
                0 0 10px #ffffff,
                -10px 0 15px 2px var(--accent-cyan),
                -20px 0 20px 2px var(--accent-blue),
                -30px 0 25px 0px rgba(59, 130, 246, 0.3);
            z-index: 2; 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            pointer-events: none;
            opacity: 0;
        }

        /* ==========================================================================
           STAGE CARDS &amp; ENTRANCE ANIMATIONS
           ========================================================================== */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 3;
            cursor: pointer;
            border-radius: var(--card-radius);
            padding: 1rem;
            transition: all var(--transition-speed);
            opacity: 0;
            animation: fadeSlideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Staggered load */
        .stage:nth-of-type(1) { animation-delay: 0.1s; }
        .stage:nth-of-type(2) { animation-delay: 0.2s; }
        .stage:nth-of-type(3) { animation-delay: 0.3s; }
        .stage:nth-of-type(4) { animation-delay: 0.4s; }
        .stage:nth-of-type(5) { animation-delay: 0.5s; }

        /* Node icon box */
        .node {
            width: 80px;
            height: 80px;
            background: #09090b;
            border: 2px solid var(--card-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            transition: all var(--transition-speed);
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            /* Duotone variables */
            --icon-main: var(--text-secondary);
            --icon-accent: rgba(255, 255, 255, 0.15);
        }

        .node svg {
            width: 32px;
            height: 32px;
            transition: all var(--transition-speed);
        }
        
        .node svg .primary {
            stroke: var(--icon-main);
            transition: stroke var(--transition-speed);
        }
        .node svg .secondary {
            stroke: var(--icon-accent);
            transition: stroke var(--transition-speed);
        }

        /* Content Card (Glassmorphism) */
        .card-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--card-radius);
            padding: 1.5rem 1rem;
            width: 100%;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all var(--transition-speed);
            position: relative;
            overflow: hidden;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
        }

        /* Step Number Typography */
        .step-number {
            position: absolute;
            top: -10px;
            right: 10px;
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            z-index: 0;
            transition: all var(--transition-speed);
            pointer-events: none;
            user-select: none;
        }

        .stage-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .stage-helper {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Tooltip (Expandable Content) */
        .tooltip-content {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            margin-top: 0;
            border-top: 1px solid transparent;
            padding-top: 0;
        }

        .tooltip-content ul {
            list-style: none;
            padding-left: 0.5rem;
        }

        .tooltip-content li {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            position: relative;
            padding-left: 1rem;
        }

        .tooltip-content li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--accent-cyan);
        }

        /* ==========================================================================
           INTERACTION &amp; ANIMATION STATES
           ========================================================================== */
        
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Active State */
        .stage.active .node,
        .stage:hover .node,
        .stage:focus-within .node {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.08);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.25);
            transform: translateY(-4px);
            --icon-main: var(--accent-cyan);
            --icon-accent: rgba(6, 182, 212, 0.5);
        }

        .stage.active .node svg {
            animation: iconPulse 2s infinite ease-in-out;
        }

        .stage.active .card-content,
        .stage:hover .card-content,
        .stage:focus-within .card-content {
            border-color: var(--card-border-hover);
            background: rgba(39, 39, 42, 0.8);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.9);
        }

        .stage.active .step-number,
        .stage:hover .step-number {
            color: rgba(6, 182, 212, 0.08);
            transform: scale(1.05) translateY(-5px);
        }

        .stage.active .tooltip-content,
        .stage:hover .tooltip-content,
        .stage:focus-within .tooltip-content {
            max-height: 150px;
            opacity: 1;
            margin-top: 1rem;
            padding-top: 1rem;
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Specific style for Compliance Filter Shield Pulse */
        @keyframes shield-pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .stage.active.shield-pulse .node {
            border-color: var(--accent-green);
            animation: shield-pulse 1.5s infinite;
            background: rgba(16, 185, 129, 0.05);
            --icon-main: var(--accent-green);
            --icon-accent: rgba(16, 185, 129, 0.4);
        }

        /* ==========================================================================
           RESPONSIVE DESIGN (MOBILE / TABLET)
           ========================================================================== */
        @media (max-width: 900px) {
            .slide-container {
                padding: 2rem 1.5rem;
                gap: 2.5rem;
            }

            .pipeline-track {
                flex-direction: column;
                gap: 1rem;
            }

            .flow-line {
                top: 5%;
                bottom: 5%;
                left: 40px;
                width: 2px;
                height: 90%;
            }

            .flow-line::after {
                width: 100%;
                height: 200%;
                background: linear-gradient(180deg, 
                    transparent 0%, 
                    rgba(59, 130, 246, 0.1) 20%, 
                    rgba(6, 182, 212, 0.8) 50%, 
                    rgba(59, 130, 246, 0.1) 80%, 
                    transparent 100%);
                animation: flow-animation-vertical 3s linear infinite;
            }

            @keyframes flow-animation-vertical {
                0% { transform: translateY(-50%); }
                100% { transform: translateY(0%); }
            }
            
            /* Change comet tail direction for mobile (vertical) */
            .packet {
                box-shadow: 
                    0 0 10px #ffffff,
                    0 -10px 15px 2px var(--accent-cyan),
                    0 -20px 20px 2px var(--accent-blue),
                    0 -30px 25px 0px rgba(59, 130, 246, 0.3);
            }

            .stage {
                flex-direction: row;
                align-items: flex-start;
                text-align: left;
                padding: 0;
                gap: 1.5rem;
            }

            .node {
                margin-bottom: 0;
                flex-shrink: 0;
                width: 60px;
                height: 60px;
                border-width: 2px;
            }

            .node svg {
                width: 24px;
                height: 24px;
            }

            .card-content {
                margin-top: 0;
                padding: 1.25rem;
            }

            .tooltip-content li {
                font-size: 0.85rem;
            }
            
            .stage.active .node,
            .stage:hover .node {
                transform: translateX(4px);
            }
            
            .stage.active .card-content,
            .stage:hover .card-content {
                transform: translateX(4px);
            }
        }

        /* Accessibility: Reduce Motion */
        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
            .flow-line::after { display: none; }
            .packet { display: none; }
            .flow-line { background: rgba(255, 255, 255, 0.15); }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const track = document.querySelector('.pipeline-track');
            const stages = document.querySelectorAll('.stage');
            const packet = document.querySelector('.packet');
            
            let currentIndex = 0;
            let isHovered = false;
            const DURATION_MS = 3000; // Time spent on each stage
            let animationInterval;

            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            // Handle hover/focus states to pause animation loop safely
            stages.forEach((stage, index) => {
                const pauseEvents = ['mouseenter', 'focusin'];
                const resumeEvents = ['mouseleave', 'focusout'];

                pauseEvents.forEach(evt => {
                    stage.addEventListener(evt, () => {
                        isHovered = true;
                        updateStage(index, true);
                    });
                });

                resumeEvents.forEach(evt => {
                    stage.addEventListener(evt, () => {
                        isHovered = false;
                        currentIndex = index;
                    });
                });
            });

            function updateStage(index, immediate = false) {
                if (prefersReducedMotion) {
                    packet.style.display = 'none';
                }

                stages.forEach(s => s.classList.remove('active', 'shield-pulse'));

                const currentStage = stages[index];
                currentStage.classList.add('active');

                if (index === 2 &amp;&amp; !prefersReducedMotion) {
                    currentStage.classList.add('shield-pulse');
                }

                if (!prefersReducedMotion) {
                    const node = currentStage.querySelector('.node');
                    
                    const trackRect = track.getBoundingClientRect();
                    const nodeRect = node.getBoundingClientRect();
                    
                    const x = nodeRect.left - trackRect.left + (nodeRect.width / 2);
                    const y = nodeRect.top - trackRect.top + (nodeRect.height / 2);

                    if (!immediate &amp;&amp; currentIndex === stages.length - 1 &amp;&amp; index === 0) {
                        packet.style.transition = 'opacity 0.2s ease';
                        packet.style.opacity = '0';
                        
                        setTimeout(() => {
                            packet.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
                            setTimeout(() => {
                                packet.style.transition = 'transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease';
                                packet.style.opacity = '1';
                            }, 50);
                        }, 200);

            const mapCanvas = document.createElement('canvas');
            mapCanvas.width = 4096; 
            mapCanvas.height = 2048;
            const ctx = mapCanvas.getContext('2d');
            
            const mapTexture = new THREE.CanvasTexture(mapCanvas);
            mapTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

            // מצב טעינה (שחור ופס תכלת עדין)
            ctx.fillStyle = '#000000'; // מים שחורים
            ctx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);
            ctx.strokeStyle = 'rgba(0, 229, 255, 0.1)';
            ctx.beginPath(); ctx.moveTo(0, 1024); ctx.lineTo(4096, 1024); ctx.stroke();
            mapTexture.needsUpdate = true;

            fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
                .then(res => res.json())
                .then(data => {
                    ctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
                    
                    ctx.fillStyle = '#000000'; // מים שחורים
                    ctx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);

                    const grad = ctx.createLinearGradient(0, 0, mapCanvas.width, mapCanvas.height);
                    grad.addColorStop(0, 'rgba(139, 92, 246, 0.4)'); 
                    grad.addColorStop(1, 'rgba(0, 229, 255, 0.4)');  

                    function drawGeoPolygon(rings) {
                        ctx.beginPath();
                        rings.forEach(ring => {
                            ring.forEach((point, i) => {
                                const x = (point[0] + 180) * (mapCanvas.width / 360);
                                const y = (90 - point[1]) * (mapCanvas.height / 180);
                                if (i === 0) ctx.moveTo(x, y);
                                else ctx.lineTo(x, y);
                            });
                            ctx.closePath();
                        });
                        
                        ctx.fillStyle = grad;
                        ctx.fill('evenodd');

                        ctx.strokeStyle = 'rgba(0, 229, 255, 0.5)'; // גבולות בהירים יותר על רקע שחור
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }

                    data.features.forEach(feature => {
                        if (!feature.geometry) return;
                        if (feature.geometry.type === 'Polygon') {
                            drawGeoPolygon(feature.geometry.coordinates);
                        } else if (feature.geometry.type === 'MultiPolygon') {
                            feature.geometry.coordinates.forEach(drawGeoPolygon);

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('contactForm');
            const toast = document.getElementById('successToast');
            let toastTimeout;

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                // Simple HTML5 Validation Check
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                // Send data to Formspree
                fetch('https://formspree.io/f/meergovz', {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                }).then(response => {
                    if (response.ok) {
                        // Show Success Toast
                        clearTimeout(toastTimeout);
                        toast.classList.add('show');
                        form.reset();
                        toastTimeout = setTimeout(() => {
                            toast.classList.remove('show');
                        }, 4000);
                    } else {
                        response.json().then(data => {
                            alert(data.errors ? data.errors.map(err => err.message).join(', ') : 'Something went wrong. Please try again.');
                        });
                    }
                }).catch(() => {
                    alert('Network error. Please check your connection and try again.');
                });
            });

            // Smooth scroll for secondary link
            document.querySelector('.secondary-link').addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetElement = document.getElementById(targetId);
                
                if (targetElement) {
                    // Focus the first input of the form for accessibility
                    const firstInput = targetElement.querySelector('input');
                    if (firstInput) {
                        firstInput.focus();
                    }
                    
                    // Scroll into view on mobile where it stacks
                    if (window.innerWidth < 1024) {
                        targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            });
        });
    </script>

(function(){

    window.parent.postMessage({type:'iframeResize', height: h, id: window.frameId}, '*');

      });

    }
    // Also poll a few times to catch late renders
    setTimeout(reportHeight, 500);
    setTimeout(reportHeight, 1500);
    setTimeout(reportHeight, 3000);

<script>
// ── Auto-resize iframes via postMessage ──────────────────────
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'iframeResize') return;
  var id = e.data.id;
  var h  = e.data.height;
  if (!id || !h) return;
  var iframe = document.querySelector('iframe[data-id="' + id + '"]');
  if (iframe) {
    var newH = Math.min(Math.max(h, window.innerHeight), 20000);
    iframe.style.height = newH + 'px';
    iframe.closest('.page-section').style.minHeight = newH + 'px';
  }
});

// ── Nav scroll tracking ──────────────────────────────────────
var sections = Array.from(document.querySelectorAll('.page-section'));
var navLinks = Array.from(document.querySelectorAll('.nav-link'));
var dots     = Array.from(document.querySelectorAll('.dot'));
var progress = document.getElementById('scroll-progress');
var NAV_H    = 56;
var activeIdx = -1;

navLinks.forEach(function(link) {
  link.addEventListener('click', function(e) {
    e.preventDefault();
    var t = document.getElementById(link.dataset.section);
    if (t) window.scrollTo({top: t.offsetTop, behavior: 'smooth'});
  });
});

dots.forEach(function(dot) {
  dot.addEventListener('click', function() {
    var t = document.getElementById(dot.dataset.target);
    if (t) window.scrollTo({top: t.offsetTop, behavior: 'smooth'});
  });
});

function update() {
  var sy   = window.scrollY;
  var docH = document.documentElement.scrollHeight - window.innerHeight;
  progress.style.width = (docH > 0 ? Math.min(100, (sy / docH) * 100) : 0) + '%';

  var cur = 0;
  sections.forEach(function(sec, i) {
    if (sy + NAV_H + 40 >= sec.offsetTop) cur = i;
  });

  if (cur !== activeIdx) {
    activeIdx = cur;
    navLinks.forEach(function(l, i) { l.classList.toggle('active', i === cur); });
    dots.forEach(function(d, i)     { d.classList.toggle('active', i === cur); });
    if (navLinks[cur]) navLinks[cur].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }
}

window.addEventListener('scroll', update, {passive: true});
update();

// CTA buttons — scroll to pricing/contact section
['nav-cta-btn','floating-cta'].forEach(function(id){
  var el = document.getElementById(id);
  if(el) el.addEventListener('click', function(e){
    e.preventDefault();
    var t = document.getElementById('s12');
    if(t) window.scrollTo({top: t.offsetTop, behavior:'smooth'});
  });
});
</script>
