<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — StockerTV</title>
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#000;color:#fff;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;
}
.logo{
  font-size:1rem;font-weight:700;letter-spacing:-.01em;
  color:rgba(255,255,255,.4);margin-bottom:4rem;
}
.code{
  font-size:clamp(6rem,15vw,10rem);font-weight:700;line-height:1;
  color:rgba(255,255,255,.12);letter-spacing:-.04em;
}
.subtitle{
  font-size:1.5rem;font-weight:600;color:#fff;
  margin-top:.5rem;letter-spacing:-.01em;
}
.message{
  color:rgba(255,255,255,.4);font-size:.95rem;
  margin-top:1rem;max-width:380px;line-height:1.6;
}
.back-btn{
  display:inline-block;margin-top:2.5rem;
  padding:12px 32px;border-radius:40px;
  background:#fff;color:#000;text-decoration:none;
  font-size:.9rem;font-weight:600;
  transition:transform .2s ease,box-shadow .2s ease;
}
.back-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(255,255,255,.15);
}
</style>
</head>
<body>
<div class="logo">StockerTV</div>
<div class="code">404</div>
<div class="subtitle">Page not found</div>
<p class="message">The page you're looking for doesn't exist or has been moved.</p>
<a href="index.html" class="back-btn">Back to StockerTV</a>
</body>
</html>
